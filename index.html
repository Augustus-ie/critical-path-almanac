const LOCAL_STORAGE_KEY = 'critical-path-state-v1';

// --- Date helpers ---------------------------------------------------------
const MS_PER_DAY = 86400000;

function parseISODate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function startOfDay(d) {
  const x = new Date(d);
  x.setHours(0, 0, 0, 0);
  return x;
}

function daysBetween(a, b) {
  return Math.round((startOfDay(a) - startOfDay(b)) / MS_PER_DAY);
}

function formatLongDate(d) {
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function formatWeekday(d) {
  return d.toLocaleDateString('en-GB', { weekday: 'long' });
}

function monthKey(d) {
  return d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
}

// --- Google Fonts ---------------------------------------------------------
function useGoogleFonts() {
  useEffect(() => {
    const links = [
      { rel: 'preconnect', href: 'https://fonts.googleapis.com' },
      { rel: 'preconnect', href: 'https://fonts.gstatic.com', crossOrigin: 'anonymous' },
      { rel: 'stylesheet', href: 'https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap' }
    ];
    const els = links.map(({ rel, href, crossOrigin }) => {
      const l = document.createElement('link');
      l.rel = rel;
      l.href = href;
      if (crossOrigin) l.crossOrigin = crossOrigin;
      document.head.appendChild(l);
      return l;
    });
    return () => els.forEach(l => l.remove());
  }, []);
}

// --- Auth -----------------------------------------------------------------
function useAuth() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let alive = true;
    sb.auth.getSession().then(({ data }) => {
      if (!alive) return;
      setSession(data.session);
      setLoading(false);
    });
    const { data: sub } = sb.auth.onAuthStateChange((_event, newSession) => {
      setSession(newSession);
    });
    return () => { alive = false; sub.subscription.unsubscribe(); };
  }, []);

  return { session, loading };
}

// --- Supabase-backed almanac state ---------------------------------------
function useAlmanacState(session) {
  const [state, setState] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [syncStatus, setSyncStatus] = useState('loading');
  const editingNotesRef = useRef(null);
  const notesDebounceRef = useRef({});

  // Initial load + migration
  useEffect(() => {
    if (!session) return;
    let alive = true;
    setLoaded(false);
    setSyncStatus('loading');

    (async () => {
      try {
        const [checksRes, notesRes] = await Promise.all([
          sb.from('milestone_check').select('milestone_id, prep_index').eq('almanac_id', ALMANAC_ID),
          sb.from('milestone_notes').select('milestone_id, notes').eq('almanac_id', ALMANAC_ID)
        ]);
        if (!alive) return;
        if (checksRes.error) throw checksRes.error;
        if (notesRes.error) throw notesRes.error;

        const next = {};
        for (const r of checksRes.data || []) {
          if (!next[r.milestone_id]) next[r.milestone_id] = { checked: [], notes: '' };
          next[r.milestone_id].checked.push(r.prep_index);
        }
        for (const r of notesRes.data || []) {
          if (!next[r.milestone_id]) next[r.milestone_id] = { checked: [], notes: '' };
          next[r.milestone_id].notes = r.notes || '';
        }

        // Migrate localStorage if Supabase is empty and we have local data
        const supabaseEmpty = !(checksRes.data || []).length && !(notesRes.data || []).length;
        if (supabaseEmpty) {
          try {
            const local = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (local) {
              const parsed = JSON.parse(local);
              const checkInserts = [];
              const notesUpserts = [];
              for (const [mId, s] of Object.entries(parsed)) {
                const checked = Array.isArray(s.checked) ? s.checked : [];
                for (const i of checked) {
                  checkInserts.push({ almanac_id: ALMANAC_ID, milestone_id: mId, prep_index: i, checked_by: session.user.id });
                }
                if (s.notes) {
                  notesUpserts.push({ almanac_id: ALMANAC_ID, milestone_id: mId, notes: s.notes, updated_by: session.user.id });
                }
                next[mId] = { checked, notes: s.notes || '' };
              }
              if (checkInserts.length) {
                const { error } = await sb.from('milestone_check').insert(checkInserts);
                if (error) console.warn('Migration insert checks failed', error);
              }
              if (notesUpserts.length) {
                const { error } = await sb.from('milestone_notes').upsert(notesUpserts);
                if (error) console.warn('Migration upsert notes failed', error);
              }
              localStorage.setItem(LOCAL_STORAGE_MIGRATED_KEY, local);
              localStorage.removeItem(LOCAL_STORAGE_KEY);
            }
          } catch (e) {
            console.warn('Migration failed', e);
          }
        }

        if (!alive) return;
        setState(next);
        setLoaded(true);
        setSyncStatus('synced');
      } catch (e) {
        console.error('Initial load failed', e);
        if (alive) {
          setLoaded(true);
          setSyncStatus('error');
        }
      }
    })();

    return () => { alive = false; };
  }, [session?.user?.id]);

  // Realtime subscriptions
  useEffect(() => {
    if (!session) return;

    const checkChannel = sb
      .channel('milestone_check_realtime')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'milestone_check', filter: `almanac_id=eq.${ALMANAC_ID}` },
        (payload) => {
          setState(prev => {
            const next = { ...prev };
            if (payload.eventType === 'INSERT') {
              const row = payload.new;
              const ms = next[row.milestone_id] || { checked: [], notes: '' };
              if (!ms.checked.includes(row.prep_index)) {
                next[row.milestone_id] = { ...ms, checked: [...ms.checked, row.prep_index] };
              }
            } else if (payload.eventType === 'DELETE') {
              const row = payload.old;
              const ms = next[row.milestone_id];
              if (ms) {
                next[row.milestone_id] = { ...ms, checked: ms.checked.filter(x => x !== row.prep_index) };
              }
            }
            return next;
          });
        }
      )
      .subscribe();

    const notesChannel = sb
      .channel('milestone_notes_realtime')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'milestone_notes', filter: `almanac_id=eq.${ALMANAC_ID}` },
        (payload) => {
          const row = payload.new || payload.old;
          if (!row) return;
          // Skip if this user is currently editing these notes
          if (editingNotesRef.current === row.milestone_id) return;
          setState(prev => {
            const ms = prev[row.milestone_id] || { checked: [], notes: '' };
            const newNotes = payload.eventType === 'DELETE' ? '' : (payload.new.notes || '');
            if (ms.notes === newNotes) return prev;
            return { ...prev, [row.milestone_id]: { ...ms, notes: newNotes } };
          });
        }
      )
      .subscribe();

    return () => {
      sb.removeChannel(checkChannel);
      sb.removeChannel(notesChannel);
    };
  }, [session?.user?.id]);

  const toggleCheck = useCallback(async (milestoneId, prepIndex) => {
    const current = state[milestoneId]?.checked || [];
    const isChecked = current.includes(prepIndex);

    setState(prev => {
      const ms = prev[milestoneId] || { checked: [], notes: '' };
      const newChecked = isChecked
        ? ms.checked.filter(x => x !== prepIndex)
        : [...ms.checked, prepIndex];
      return { ...prev, [milestoneId]: { ...ms, checked: newChecked } };
    });

    setSyncStatus('syncing');
    try {
      if (isChecked) {
        const { error } = await sb.from('milestone_check').delete().match({
          almanac_id: ALMANAC_ID,
          milestone_id: milestoneId,
          prep_index: prepIndex
        });
        if (error) throw error;
      } else {
        const { error } = await sb.from('milestone_check').insert({
          almanac_id: ALMANAC_ID,
          milestone_id: milestoneId,
          prep_index: prepIndex,
          checked_by: session.user.id
        });
        // Ignore unique-violation errors (race condition: someone else inserted it)
        if (error && error.code !== '23505') throw error;
      }
      setSyncStatus('synced');
    } catch (e) {
      console.warn('Toggle check sync failed', e);
      setSyncStatus('error');
    }
  }, [state, session]);

  const setNotes = useCallback((milestoneId, notes) => {
    setState(prev => ({
      ...prev,
      [milestoneId]: { ...(prev[milestoneId] || { checked: [], notes: '' }), notes }
    }));

    if (notesDebounceRef.current[milestoneId]) {
      clearTimeout(notesDebounceRef.current[milestoneId]);
    }
    setSyncStatus('syncing');
    notesDebounceRef.current[milestoneId] = setTimeout(async () => {
      try {
        const { error } = await sb.from('milestone_notes').upsert({
          almanac_id: ALMANAC_ID,
          milestone_id: milestoneId,
          notes,
          updated_by: session.user.id,
          updated_at: new Date().toISOString()
        });
        if (error) throw error;
        setSyncStatus('synced');
      } catch (e) {
        console.warn('Notes sync failed', e);
        setSyncStatus('error');
      }
    }, 500);
  }, [session]);

  const setNotesEditing = useCallback((milestoneId) => {
    editingNotesRef.current = milestoneId;
  }, []);

  return { state, loaded, syncStatus, toggleCheck, setNotes, setNotesEditing };
}

}

function DaysPill({ days }) {
  const label = days === 0 ? 'today' : days < 0 ? `${Math.abs(days)}d ago` : `in ${days}d`;
  const tier = days < 0 ? 'past' : days <= 7 ? 'imminent' : days <= 14 ? 'soon' : 'future';
  const styles = {
    imminent: { color: '#1A0F1A',         bg: GOLD,           border: GOLD,                weight: 600 },
    soon:     { color: GOLD,              bg: 'transparent',  border: GOLD + '80',         weight: 500 },
    future:   { color: PALETTE.textMuted, bg: 'transparent',  border: PALETTE.border,      weight: 400 },
    past:     { color: PALETTE.textDim,   bg: 'transparent',  border: PALETTE.border,      weight: 400 }
  }[tier];
  return (
    <span
      className="inline-flex items-center rounded-full px-3 py-1 text-xs"
      style={{
        fontFamily: FONT_BODY,
        fontVariantNumeric: 'tabular-nums',
        letterSpacing: '0.04em',
        color: styles.color,
        backgroundColor: styles.bg,
        border: `1px solid ${styles.border}`,
        fontWeight: styles.weight
      }}
    >
      {label}
    </span>
  );
}

}

function Chevron({ open }) {
  return (
    <svg
      width="14" height="14" viewBox="0 0 16 16"
      style={{

        transform: open ? 'rotate(180deg)' : 'rotate(0deg)',
        color: PALETTE.textDim
      }}
    >
      <path d="M3 6 L8 11 L13 6" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function Collapse({ open, children }) {
  const innerRef = useRef(null);
  const [height, setHeight] = useState(open ? 'auto' : 0);
  useEffect(() => {
    if (!innerRef.current) return;
    const h = innerRef.current.scrollHeight;
    if (open) {
      setHeight(h);
      const t = setTimeout(() => setHeight('auto'), 360);
      return () => clearTimeout(t);
    } else {
      setHeight(h);
      requestAnimationFrame(() => requestAnimationFrame(() => setHeight(0)));
    }
  }, [open]);
  return (
    <div
      style={{
        height: typeof height === 'number' ? `${height}px` : height,
        overflow: 'hidden',
        transition: 'height 320ms cubic-bezier(.4,.1,.2,1)'
      }}
    >
      <div ref={innerRef}>{children}</div>
    </div>
  );
}

function Starfield() {
  const stars = useMemo(() => {
    const arr = [];
    let s = 1337;
    for (let i = 0; i < 90; i++) {
      s = (s * 9301 + 49297) % 233280;
      const x = (s / 233280) * 100;
      s = (s * 9301 + 49297) % 233280;
      const y = (s / 233280) * 100;
      s = (s * 9301 + 49297) % 233280;
      const r = 0.4 + (s / 233280) * 1.2;
      s = (s * 9301 + 49297) % 233280;
      const o = 0.15 + (s / 233280) * 0.5;
      arr.push({ x, y, r, o });
    }
    return arr;
  }, []);
  return (
    <svg
      aria-hidden
      style={{
        position: 'fixed',
        inset: 0,
        width: '100%',
        height: '100%',
        pointerEvents: 'none',
        zIndex: 0,
        opacity: 0.55
      }}
    >
      {stars.map((s, i) => (
        <circle
          key={i}
          cx={`${s.x}%`}
          cy={`${s.y}%`}
          r={s.r}
          fill="#F0E0C8"
          opacity={s.o}
        />
      ))}
    </svg>
  );
}

// --- Passcode screen ------------------------------------------------------
function PasscodeScreen() {
  const [passcode, setPasscode] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState(null);

  const submit = async (e) => {
    e.preventDefault();
    if (!passcode) return;
    setError(null);
    setSubmitting(true);

    try {
      // Sign in anonymously to get an auth.uid() we can attach membership to
      const { data: signInData, error: signInError } = await sb.auth.signInAnonymously();
      if (signInError) throw signInError;

      // Verify the passcode and add this anon user to the almanac
      const { data: joined, error: rpcError } = await sb.rpc('join_almanac_with_passcode', {
        input_passcode: passcode
      });
      if (rpcError) throw rpcError;

      if (!joined) {
        // Wrong passcode — clean up the orphan anon session
        await sb.auth.signOut();
        setError('Incorrect passcode. Please try again.');
        setSubmitting(false);
        return;
      }
      // Success — App will re-render to Almanac on the next auth/membership check.
      // Don't set submitting=false here; the screen unmounts on success.
    } catch (err) {
      console.error('Passcode submit failed', err);
      // If we created a session before the failure, clean it up
      await sb.auth.signOut().catch(() => {});
      setError(err.message || 'Failed to sign in. Please try again.');
      setSubmitting(false);
    }
  };

  return (
    <div
      style={{
        minHeight: '100vh',
        backgroundColor: PALETTE.bg,
        color: PALETTE.text,
        fontFamily: FONT_BODY,
        position: 'relative',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        padding: '40px 20px'
      }}
    >
      <div
        aria-hidden
        style={{
          position: 'fixed',
          inset: 0,
          pointerEvents: 'none',
          zIndex: 0,
          background: `

            <circle cx="30" cy="30" r="14" fill="none" stroke={GOLD} strokeWidth="0.5" />
            <circle cx="30" cy="30" r="2" fill={GOLD} />
            <line x1="30" y1="2" x2="30" y2="58" stroke={GOLD} strokeWidth="0.3" />
            <line x1="2" y1="30" x2="58" y2="30" stroke={GOLD} strokeWidth="0.3" />
          </svg>

          <div
            style={{
              fontFamily: FONT_BODY,
              fontSize: 11,
              textTransform: 'uppercase',
              letterSpacing: '0.28em',
              color: PALETTE.textDim,
              marginBottom: 18
            }}
          >
            Enter passcode
          </div>

          <label
            htmlFor="passcode"
            style={{
              display: 'block',
              fontFamily: FONT_BODY,
              fontSize: 12,
              color: PALETTE.textMuted,
              marginBottom: 8,
              letterSpacing: '0.05em'
            }}
          >
            Passcode
          </label>
          <input
            id="passcode"
            type="password"
            autoComplete="current-password"
            required
            value={passcode}
            onChange={(e) => setPasscode(e.target.value)}
            placeholder="••••••"
            style={{
              width: '100%',
              fontFamily: FONT_BODY,
              fontSize: 15,
              color: PALETTE.text,
              backgroundColor: 'rgba(26, 15, 26, 0.5)',
              border: `1px solid ${PALETTE.border}`,

              padding: '11px 13px',
              outline: 'none',

            }}
            onFocus={(e) => e.target.style.borderColor = GOLD + '80'}
            onBlur={(e) => e.target.style.borderColor = PALETTE.border}
          />

          {error && (
            <div
              style={{
                marginTop: 12,
                fontFamily: FONT_BODY,
                fontStyle: 'italic',
                fontSize: 12,
                color: '#C57878'
              }}
            >
              {error}
            </div>
          )}

          <button
            type="submit"
            disabled={submitting || !passcode}
            style={{
              marginTop: 18,
              width: '100%',
              fontFamily: FONT_DISPLAY,
              fontStyle: 'italic',
              fontWeight: 300,
              fontSize: 15,
              color: '#1A0F1A',
              backgroundColor: GOLD,
              border: `1px solid ${GOLD}`,
              borderRadius: 4,
              padding: '11px 16px',
              cursor: submitting || !passcode ? 'not-allowed' : 'pointer',
              opacity: submitting || !passcode ? 0.65 : 1,
              letterSpacing: '0.04em',
              transition: 'opacity 200ms ease'
            }}
          >
            {submitting ? 'unlocking…' : 'unlock the almanac'}
          </button>

          <div
            style={{
              marginTop: 18,
              fontFamily: FONT_BODY,
              fontStyle: 'italic',
              fontSize: 12,
              color: PALETTE.textDim,
              lineHeight: 1.55
            }}
          >
            Shared with three travellers. If you don't have the passcode, ask Augustus.
          </div>
        </form>
      </div>
    </div>
  );
}

// --- Almanac (the main authenticated view) -------------------------------
function Almanac({ session }) {
  const { state, loaded, syncStatus, toggleCheck, setNotes, setNotesEditing } = useAlmanacState(session);
  const today = useMemo(() => startOfDay(new Date()), []);

  const sorted = useMemo(() =>
    [...milestones].sort((a, b) => parseISODate(a.date) - parseISODate(b.date))
  , []);

  const upcoming = useMemo(() =>
    sorted.filter(m => daysBetween(parseISODate(m.date), today) >= 0)
  , [sorted, today]);

  const [filter, setFilter] = useState(() => new Set());
  const toggleFilter = (key) => {
    setFilter(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key); else next.add(key);
      return next;
    });
  };
  const clearFilter = () => setFilter(new Set());
  const passesFilter = (m) => filter.size === 0 || filter.has(m.workstream);

  const nextThree = upcoming.filter(passesFilter).slice(0, 3);
  const nextThreeIds = new Set(nextThree.map(m => m.id));

  const totalPrep = useMemo(() => milestones.reduce((acc, m) => acc + m.prep.length, 0), []);
  const completedPrep = useMemo(() => {
    let n = 0;
    for (const m of milestones) {
      const ck = state[m.id]?.checked || [];
      n += ck.filter(i => i < m.prep.length).length;
    }
    return n;
  }, [state]);

  const fullList = sorted
    .filter(m => !nextThreeIds.has(m.id))
    .filter(passesFilter);
  const grouped = useMemo(() => {
    const groups = [];
    let currentKey = null;
    let currentItems = null;
    let todayInserted = false;
    for (const m of fullList) {
      const d = parseISODate(m.date);
      const key = monthKey(d);
      if (key !== currentKey) {
        currentKey = key;
        currentItems = { key, items: [] };
        groups.push(currentItems);
      }
      const days = daysBetween(d, today);
      if (!todayInserted && days >= 0) {
        currentItems.items.push({ kind: 'today' });
        todayInserted = true;
      }
      currentItems.items.push({ kind: 'milestone', milestone: m, days, isPast: days < 0 });
    }
    if (!todayInserted && groups.length) {
      groups[groups.length - 1].items.push({ kind: 'today' });
    }
    return groups;
  }, [fullList, today]);

  const dublinAnchor = '2026-08-12';
  const permanentAnchor = '2026-09-04';

  const nextMilestone = upcoming[0];
  const nextMilestoneDays = nextMilestone ? daysBetween(parseISODate(nextMilestone.date), today) : null;

  const monthAnchors = useMemo(() => grouped.map(g => g.key), [grouped]);
  const scrollToMonth = (key) => {
    const el = document.querySelector(`[data-month-anchor="${CSS.escape(key)}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  if (!loaded) return <LoadingScreen label="loading your almanac" />;

  return (
    <div
      style={{
        minHeight: '100vh',
        backgroundColor: PALETTE.bg,
        color: PALETTE.text,
        fontFamily: FONT_BODY,
        position: 'relative'
      }}
    >
      <div
        aria-hidden
        style={{
          position: 'fixed',
          inset: 0,
          pointerEvents: 'none',
          zIndex: 0,
          background: `
            radial-gradient(ellipse at 20% -10%, rgba(165, 101, 138, 0.18), transparent 55%),
            radial-gradient(ellipse at 100% 100%, rgba(229, 180, 112, 0.08), transparent 55%),
            radial-gradient(ellipse at 50% 50%, rgba(26, 15, 26, 0) 0%, rgba(10, 6, 10, 0.5) 100%)
          `
        }}
      />
      <Starfield />

      <AccountBadge session={session} syncStatus={syncStatus} />

      <div className="relative" style={{ zIndex: 1, maxWidth: 920, margin: '0 auto', padding: '56px 28px 96px' }}>

        <Reveal index={0}>
          <header style={{ marginBottom: 56 }}>
            <div
              style={{
                fontFamily: FONT_BODY,
                fontStyle: 'italic',
                fontSize: 13,
                color: PALETTE.textMuted,
                letterSpacing: '0.04em',
                marginBottom: 14
              }}
            >
              {formatLongDate(today)}
            </div>
            <h1
              style={{
                fontFamily: FONT_DISPLAY,
                fontWeight: 300,
                fontSize: 'clamp(40px, 6vw, 64px)',
                lineHeight: 1.02,
                letterSpacing: '-0.02em',
                color: PALETTE.text,
                marginBottom: 8
              }}
            >
              Critical Path <em style={{ fontWeight: 300, fontStyle: 'italic', color: GOLD }}>Almanac</em>
            </h1>
            <div
              style={{
                fontFamily: FONT_BODY,
                fontStyle: 'italic',
                fontSize: 14,
                color: PALETTE.textDim,
                marginBottom: 36,
                letterSpacing: '0.02em'
              }}
            >
              A crossing from Virginia to Ireland, charted by date.
            </div>

            <div
              style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))',
                gap: 18
              }}
            >
              <Countdown
                label="Days to Dublin"
                anchor={dublinAnchor}
                today={today}
                sublabel="Family travel, 12 August 2026"
              />
              <Countdown
                label="Days to Permanent Departure"
                anchor={permanentAnchor}
                today={today}
                sublabel="Aer Lingus EI 118, 4 September 2026"
              />
            </div>
          </header>
        </Reveal>

        <Reveal index={1}>
          <section style={{ marginBottom: 40 }}>
            <ProgressLine completed={completedPrep} total={totalPrep} />
            <WorkstreamFilters
              filter={filter}
              onToggle={toggleFilter}
              onClear={clearFilter}
            />
          </section>
        </Reveal>

        {nextThree.length > 0 && (
          <Reveal index={2}>
            <section style={{ marginBottom: 64 }}>
              <SectionHeader
                title="Next up"
                subtitle={filter.size > 0 ? 'The nearest milestones in your selected workstreams.' : 'The three milestones nearest at hand.'}
              />
              <div className="flex flex-col gap-3" style={{ marginTop: 20 }}>
                {nextThree.map((m, i) => (
                  <Reveal key={m.id} index={i + 3}>
                    <MilestoneCard
                      milestone={m}
                      today={today}
                      milestoneState={state[m.id]}
                      onToggleCheck={toggleCheck}
                      onSetNotes={setNotes}
                      onNotesFocus={setNotesEditing}
                      isPast={false}
                      expandedDefault={i === 0}
                      featured={true}
                    />
                  </Reveal>
                ))}
              </div>
            </section>
          </Reveal>
        )}

        <Reveal index={6}>
          <section>
            <SectionHeader
              title="The full crossing"
              subtitle={
                filter.size > 0
                  ? `Filtered to ${filter.size} workstream${filter.size === 1 ? '' : 's'}, in order, grouped by month.`
                  : 'Every milestone, in order, grouped by month.'
              }
            />

            {monthAnchors.length > 1 && (
              <MonthRail months={monthAnchors} onJump={scrollToMonth} />
            )}

            <div style={{ marginTop: 24 }}>
              {grouped.length === 0 && (
                <div
                  style={{
                    fontFamily: FONT_BODY,
                    fontStyle: 'italic',
                    color: PALETTE.textDim,
                    textAlign: 'center',
                    padding: '40px 20px',
                    border: `1px dashed ${PALETTE.border}`,
                    borderRadius: 6
                  }}
                >
                  No milestones match the current filter.
                </div>
              )}
              {grouped.map((group, gi) => (
                <div key={group.key} data-month-anchor={group.key} style={{ marginBottom: 36, scrollMarginTop: 24 }}>
                  <MonthDivider label={group.key} />
                  <div className="flex flex-col gap-2.5" style={{ marginTop: 16 }}>
                    {group.items.map((it, ii) => {
                      if (it.kind === 'today') {
                        return (
                          <TodayMarker
                            key={`today-${gi}`}
                            nextLabel={nextMilestone?.title}
                            nextDays={nextMilestoneDays}
                          />
                        );
                      }
                      const m = it.milestone;
                      return (
                        <MilestoneCard
                          key={m.id}
                          milestone={m}
                          today={today}
                          milestoneState={state[m.id]}
                          onToggleCheck={toggleCheck}
                          onSetNotes={setNotes}
                          onNotesFocus={setNotesEditing}
                          isPast={it.isPast}
                          featured={false}
                        />
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </section>
        </Reveal>

        <Reveal index={7}>
          <div
            style={{
              marginTop: 80,
              textAlign: 'center',
              fontFamily: FONT_DISPLAY,
              fontStyle: 'italic',
              fontSize: 13,
              color: PALETTE.textDim,
              letterSpacing: '0.08em'
            }}
          >
            <div style={{ fontSize: 18, marginBottom: 10, color: PALETTE.textMuted }}>✦</div>
            fair winds, gentle landings.
          </div>
        </Reveal>
      </div>

      <style>{`
        @keyframes almanac-pulse {
          0%, 100% { opacity: 0.85; transform: scale(1); }
          50% { opacity: 1; transform: scale(1.18); }
        }
        ::selection { background: ${GOLD}55; color: ${PALETTE.text}; }
        textarea::placeholder { color: ${PALETTE.textDim}; font-style: italic; }
        body { background: ${PALETTE.bg}; }
      `}</style>
    </div>
  );
}

// --- Membership check -----------------------------------------------------
function useMembership(session) {
  const [status, setStatus] = useState('checking'); // 'checking' | 'member' | 'not-member'

  useEffect(() => {
    if (!session) {
      setStatus('not-member');
      return;
    }
    let alive = true;
    setStatus('checking');
    sb.from('almanac_members')
      .select('almanac_id')
      .eq('almanac_id', ALMANAC_ID)
      .eq('user_id', session.user.id)
      .maybeSingle()
      .then(({ data, error }) => {
        if (!alive) return;
        if (error) {
          console.warn('Membership check failed', error);
          setStatus('not-member');
          return;
        }
        setStatus(data ? 'member' : 'not-member');
      });
    return () => { alive = false; };
  }, [session?.user?.id]);

  return status;
}

// --- App root -------------------------------------------------------------
function App() {
  useGoogleFonts();
  const { session, loading } = useAuth();
  const membership = useMembership(session);

  if (loading || (session && membership === 'checking')) {
    return <LoadingScreen label="opening the almanac" />;
  }
  if (!session || membership !== 'member') return <PasscodeScreen />;
  return <Almanac session={session} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
