const { useState, useEffect, useRef, useMemo, useCallback } = React;

const STORAGE_KEY = 'critical-path-state-v1';

const GOLD = '#E5B470';
const FONT_DISPLAY = "'Fraunces', 'Iowan Old Style', Georgia, serif";
const FONT_BODY = "'Spectral', Georgia, serif";

// --- Date helpers ---------------------------------------------------------
const MS_PER_DAY = 86400000;

function parseISODate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function startOfDay(d) {
  const x = new Date(d);
  x.setHours(0, 0, 0, 0);
  return x;
}

function daysBetween(a, b) {
  return Math.round((startOfDay(a) - startOfDay(b)) / MS_PER_DAY);
}

function formatLongDate(d) {
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function formatWeekday(d) {
  return d.toLocaleDateString('en-GB', { weekday: 'long' });
}

function monthKey(d) {
  return d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
}

// --- Storage --------------------------------------------------------------
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {
    console.warn('Almanac: load failed', e);
  }
  return {};
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    return true;
  } catch (e) {
    console.warn('Almanac: save failed', e);
    return false;
  }
}

// --- Google Fonts ---------------------------------------------------------
function useGoogleFonts() {
  useEffect(() => {
    const links = [
      { rel: 'preconnect', href: 'https://fonts.googleapis.com' },
      { rel: 'preconnect', href: 'https://fonts.gstatic.com', crossOrigin: 'anonymous' },
      { rel: 'stylesheet', href: 'https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap' }
    ];
    const els = links.map(({ rel, href, crossOrigin }) => {
      const l = document.createElement('link');
      l.rel = rel;
      l.href = href;
      if (crossOrigin) l.crossOrigin = crossOrigin;
      document.head.appendChild(l);
      return l;
    });
    return () => els.forEach(l => l.remove());
  }, []);
}

function WorkstreamPill({ workstream }) {
  const ws = workstreams[workstream];
  if (!ws) return null;
  return (

        className="inline-block w-1.5 h-1.5 rounded-full"
        style={{ backgroundColor: ws.color, boxShadow: `0 0 6px ${ws.color}AA` }}
      />
      {ws.name}
    </span>
  );
}

function DaysPill({ days }) {
  const label = days === 0 ? 'today' : days < 0 ? `${Math.abs(days)}d ago` : `in ${days}d`;
  const tier = days < 0 ? 'past' : days <= 7 ? 'imminent' : days <= 14 ? 'soon' : 'future';
  const styles = {
    imminent: { color: '#1A0F1A',         bg: GOLD,           border: GOLD,                weight: 600 },
    soon:     { color: GOLD,              bg: 'transparent',  border: GOLD + '80',         weight: 500 },
    future:   { color: PALETTE.textMuted, bg: 'transparent',  border: PALETTE.border,      weight: 400 },
    past:     { color: PALETTE.textDim,   bg: 'transparent',  border: PALETTE.border,      weight: 400 }
  }[tier];
  return (
    <span
      className="inline-flex items-center rounded-full px-3 py-1 text-xs"
      style={{
        fontFamily: FONT_BODY,
        fontVariantNumeric: 'tabular-nums',
        letterSpacing: '0.04em',
        color: styles.color,
        backgroundColor: styles.bg,
        border: `1px solid ${styles.border}`,
        fontWeight: styles.weight
      }}
    >
      {label}
    </span>
  );
}

function Checkbox({ checked, onChange }) {
  return (
    <button
      type="button"
      onClick={onChange}
      className="relative shrink-0 transition-colors"
      style={{
        width: 18,
        height: 18,
        marginTop: 4,
        borderRadius: 3,
        border: `1px solid ${checked ? GOLD : PALETTE.border}`,
        backgroundColor: checked ? GOLD + '22' : 'transparent'
      }}
      aria-pressed={checked}

      {checked && (
        <svg viewBox="0 0 16 16" width="14" height="14" style={{ position: 'absolute', top: 1, left: 1 }}>
          <path d="M3 8.5 L6.5 12 L13 4.5" fill="none" stroke={GOLD} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      )}
    </button>
  );
}

function Chevron({ open }) {
  return (
    <svg
      width="14" height="14" viewBox="0 0 16 16"
      style={{
        transition: 'transform 280ms cubic-bezier(.4,.1,.2,1)',
        transform: open ? 'rotate(180deg)' : 'rotate(0deg)',
        color: PALETTE.textDim
      }}
    >
      <path d="M3 6 L8 11 L13 6" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// --- Auto-height transition wrapper --------------------------------------
function Collapse({ open, children }) {
  const innerRef = useRef(null);
  const [height, setHeight] = useState(open ? 'auto' : 0);
  useEffect(() => {
    if (!innerRef.current) return;
    const h = innerRef.current.scrollHeight;
    if (open) {
      setHeight(h);
      const t = setTimeout(() => setHeight('auto'), 360);
      return () => clearTimeout(t);
    } else {
      setHeight(h);
      requestAnimationFrame(() => requestAnimationFrame(() => setHeight(0)));
    }
  }, [open]);
  return (
    <div
      style={{
        height: typeof height === 'number' ? `${height}px` : height,
        overflow: 'hidden',
        transition: 'height 320ms cubic-bezier(.4,.1,.2,1)'
      }}
    >
      <div ref={innerRef}>{children}</div>
    </div>
  );
}

  const totalCount = milestone.prep.length;

        style={{
          position: 'absolute',
          left: 0, top: 0, bottom: 0,
          width: 2,
          backgroundColor: ws.color,
          opacity: featured ? 0.85 : 0.55,
          borderTopLeftRadius: 6,
          borderBottomLeftRadius: 6

      <button
        type="button"
        onClick={toggle}
        className="w-full text-left"
        style={{ padding: '20px 22px 20px 26px' }}

        <div className="flex items-start gap-5">
          <div className="shrink-0" style={{ width: featured ? 92 : 78 }}>
            <div
              style={{
                fontFamily: FONT_DISPLAY,
                fontWeight: 400,
                fontSize: featured ? 32 : 26,
                lineHeight: 1,
                fontVariantNumeric: 'tabular-nums',
                color: PALETTE.text,
                letterSpacing: '-0.01em'
              }}
            >
              {date.getDate()}
            </div>
            <div
              style={{
                fontFamily: FONT_BODY,
                fontSize: 11,
                marginTop: 6,
                textTransform: 'uppercase',
                letterSpacing: '0.22em',
                color: PALETTE.textDim
              }}
            >
              {date.toLocaleDateString('en-GB', { month: 'short' })}
            </div>
            <div
              style={{

                fontSize: 11,

              {formatWeekday(date)}
            </div>
          </div>

          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-3 mb-2 flex-wrap">
              <WorkstreamPill workstream={milestone.workstream} />
              {totalCount > 0 && (
                <span
                  style={{
                    fontFamily: FONT_BODY,
                    fontSize: 11,
                    fontVariantNumeric: 'tabular-nums',
                    color: completedCount === totalCount ? GOLD : (completedCount > 0 ? PALETTE.textMuted : PALETTE.textDim),

            </div>

// --- Stagger reveal -------------------------------------------------------
function Reveal({ index, children, delay = 50 }) {
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setShown(true), index * delay + 80);
    return () => clearTimeout(t);
  }, [index, delay]);
  return (
    <div
      style={{
        opacity: shown ? 1 : 0,
        transform: shown ? 'translateY(0)' : 'translateY(8px)',
        transition: 'opacity 520ms ease, transform 520ms cubic-bezier(.2,.7,.2,1)'
      }}
    >
      {children}
    </div>
  );
}

// --- Starfield decoration -------------------------------------------------
function Starfield() {
  const stars = useMemo(() => {
    const arr = [];
    let s = 1337;
    for (let i = 0; i < 90; i++) {
      s = (s * 9301 + 49297) % 233280;
      const x = (s / 233280) * 100;
      s = (s * 9301 + 49297) % 233280;
      const y = (s / 233280) * 100;
      s = (s * 9301 + 49297) % 233280;
      const r = 0.4 + (s / 233280) * 1.2;
      s = (s * 9301 + 49297) % 233280;
      const o = 0.15 + (s / 233280) * 0.5;
      arr.push({ x, y, r, o });
    }
    return arr;
  }, []);
  return (
    <svg
      aria-hidden
      style={{
        position: 'fixed',
        inset: 0,
        width: '100%',
        height: '100%',
        pointerEvents: 'none',
        zIndex: 0,
        opacity: 0.55
      }}
    >
      {stars.map((s, i) => (
        <circle
          key={i}
          cx={`${s.x}%`}
          cy={`${s.y}%`}
          r={s.r}
          fill="#F0E0C8"
          opacity={s.o}
        />
      ))}
    </svg>
  );
}

// --- Main app -------------------------------------------------------------
function App() {
  useGoogleFonts();

  const [persisted, setPersisted] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [savingPulse, setSavingPulse] = useState(false);
  const saveTimer = useRef(null);

  const today = useMemo(() => startOfDay(new Date()), []);

  useEffect(() => {
    setPersisted(loadState() || {});
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      setSavingPulse(true);
      saveState(persisted);
      setTimeout(() => setSavingPulse(false), 600);
    }, 280);
    return () => saveTimer.current && clearTimeout(saveTimer.current);
  }, [persisted, loaded]);

  const patchMilestone = useCallback((id, patch) => {
    setPersisted(prev => ({
      ...prev,
      [id]: { ...(prev[id] || {}), ...patch }
    }));
  }, []);

  const sorted = useMemo(() =>
    [...milestones].sort((a, b) => parseISODate(a.date) - parseISODate(b.date))
  , []);

  const upcoming = useMemo(() =>
    sorted.filter(m => daysBetween(parseISODate(m.date), today) >= 0)
  , [sorted, today]);

  const [filter, setFilter] = useState(() => new Set());
  const toggleFilter = (key) => {
    setFilter(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key); else next.add(key);
      return next;
    });
  };
  const clearFilter = () => setFilter(new Set());
  const passesFilter = (m) => filter.size === 0 || filter.has(m.workstream);

  const nextThree = upcoming.filter(passesFilter).slice(0, 3);
  const nextThreeIds = new Set(nextThree.map(m => m.id));

  const totalPrep = useMemo(() => milestones.reduce((acc, m) => acc + m.prep.length, 0), []);
  const completedPrep = useMemo(() => {
    let n = 0;
    for (const m of milestones) {
      const ck = persisted[m.id]?.checked || [];
      n += ck.filter(i => i < m.prep.length).length;
    }
    return n;
  }, [persisted]);

  const fullList = sorted
    .filter(m => !nextThreeIds.has(m.id))
    .filter(passesFilter);
  const grouped = useMemo(() => {
    const groups = [];
    let currentKey = null;
    let currentItems = null;
    let todayInserted = false;
    for (const m of fullList) {
      const d = parseISODate(m.date);
      const key = monthKey(d);
      if (key !== currentKey) {
        currentKey = key;
        currentItems = { key, items: [] };
        groups.push(currentItems);
      }
      const days = daysBetween(d, today);
      if (!todayInserted && days >= 0) {
        currentItems.items.push({ kind: 'today' });
        todayInserted = true;
      }
      currentItems.items.push({ kind: 'milestone', milestone: m, days, isPast: days < 0 });
    }
    if (!todayInserted && groups.length) {
      groups[groups.length - 1].items.push({ kind: 'today' });
    }
    return groups;
  }, [fullList, today]);

  const dublinAnchor = '2026-08-12';
  const permanentAnchor = '2026-09-04';

  const nextMilestone = upcoming[0];
  const nextMilestoneDays = nextMilestone ? daysBetween(parseISODate(nextMilestone.date), today) : null;

  const monthAnchors = useMemo(() => grouped.map(g => g.key), [grouped]);
  const scrollToMonth = (key) => {
    const el = document.querySelector(`[data-month-anchor="${CSS.escape(key)}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  return (
    <div
      style={{
        minHeight: '100vh',
        backgroundColor: PALETTE.bg,
        color: PALETTE.text,
        fontFamily: FONT_BODY,
        position: 'relative'
      }}
    >
      <div
        aria-hidden
        style={{
          position: 'fixed',
          inset: 0,
          pointerEvents: 'none',
          zIndex: 0,
          background: `
            radial-gradient(ellipse at 20% -10%, rgba(165, 101, 138, 0.18), transparent 55%),
            radial-gradient(ellipse at 100% 100%, rgba(229, 180, 112, 0.08), transparent 55%),
            radial-gradient(ellipse at 50% 50%, rgba(26, 15, 26, 0) 0%, rgba(10, 6, 10, 0.5) 100%)
          `
        }}
      />
      <Starfield />

      <div className="relative" style={{ zIndex: 1, maxWidth: 920, margin: '0 auto', padding: '56px 28px 96px' }}>

        <div
          style={{
            position: 'fixed',
            top: 18,
            right: 22,
            fontFamily: FONT_BODY,
            fontStyle: 'italic',
            fontSize: 11,
            color: GOLD,
            opacity: savingPulse ? 0.9 : 0,
            transition: 'opacity 360ms ease',
            letterSpacing: '0.1em',
            zIndex: 50,
            display: 'flex',
            alignItems: 'center',
            gap: 6
          }}
        >
          <span
            style={{
              width: 5, height: 5, borderRadius: '50%',
              backgroundColor: GOLD,
              boxShadow: `0 0 8px ${GOLD}`
            }}
          />
          saving
        </div>

        <Reveal index={0}>
          <header style={{ marginBottom: 56 }}>
            <div
              style={{
                fontFamily: FONT_BODY,
                fontStyle: 'italic',
                fontSize: 13,
                color: PALETTE.textMuted,
                letterSpacing: '0.04em',
                marginBottom: 14
              }}
            >
              {formatLongDate(today)}
            </div>
            <h1
              style={{
                fontFamily: FONT_DISPLAY,
                fontWeight: 300,
                fontSize: 'clamp(40px, 6vw, 64px)',
                lineHeight: 1.02,
                letterSpacing: '-0.02em',
                color: PALETTE.text,
                marginBottom: 8
              }}
            >
              Critical Path <em style={{ fontWeight: 300, fontStyle: 'italic', color: GOLD }}>Almanac</em>
            </h1>
            <div
              style={{
                fontFamily: FONT_BODY,
                fontStyle: 'italic',
                fontSize: 14,
                color: PALETTE.textDim,
                marginBottom: 36,
                letterSpacing: '0.02em'
              }}
            >
              A crossing from Virginia to Ireland, charted by date.
            </div>

            <div
              style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))',
                gap: 18
              }}
            >
              <Countdown
                label="Days to Dublin"
                anchor={dublinAnchor}
                today={today}
                sublabel="Family travel, 12 August 2026"
              />
              <Countdown
                label="Days to Permanent Departure"
                anchor={permanentAnchor}
                today={today}
                sublabel="Aer Lingus EI 118, 4 September 2026"
              />
            </div>
          </header>
        </Reveal>

        <Reveal index={1}>
          <section style={{ marginBottom: 40 }}>
            <ProgressLine completed={completedPrep} total={totalPrep} />
            <WorkstreamFilters
              filter={filter}
              onToggle={toggleFilter}
              onClear={clearFilter}
            />
          </section>
        </Reveal>

        {nextThree.length > 0 && (
          <Reveal index={2}>
            <section style={{ marginBottom: 64 }}>
              <SectionHeader
                title="Next up"
                subtitle={filter.size > 0 ? 'The nearest milestones in your selected workstreams.' : 'The three milestones nearest at hand.'}

              <div className="flex flex-col gap-3" style={{ marginTop: 20 }}>
                {nextThree.map((m, i) => (
                  <Reveal key={m.id} index={i + 3}>
                    <MilestoneCard
                      milestone={m}
                      today={today}
                      state={persisted[m.id]}

                  </Reveal>

              </div>
            </section>
          </Reveal>

        <Reveal index={6}>
          <section>

                filter.size > 0

            />

            {monthAnchors.length > 1 && (

      <style>{`

          0%, 100% { opacity: 0.85; transform: scale(1); }
          50% { opacity: 1; transform: scale(1.18); }
        }
        ::selection { background: ${GOLD}55; color: ${PALETTE.text}; }
        textarea::placeholder { color: ${PALETTE.textDim}; font-style: italic; }
        body { background: ${PALETTE.bg}; }
      `}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
